<script>
const {createApp,ref,onMounted,watch}=Vue;
const API='http://localhost:8000';
createApp({setup(){
const tab=ref('dashboard'),zonas=ref([]),dash=ref({avgAqi:0,avgTraffic:0,alertCount:0,avgGreenScore:0,alerts:[]}),
gsRanked=ref([]),bestZone=ref(null),rutas=ref([]),bestHours=ref([]),ecoOrigen=ref(''),ecoDest=ref(''),
chatOpen=ref(true),chatIn=ref(''),chatMsgs=ref([{id:0,text:'¡Hola! Soy URBS. ¿En qué te ayudo?',u:false}]),
indicators=ref([{label:'NO₂',value:'--',color:'#00e5ff'},{label:'CO₂',value:'--',color:'#a78bfa'},{label:'PM10',value:'--',color:'#fb923c'},{label:'PM2.5',value:'--',color:'#f43f5e'},{label:'Ruido dB',value:'--',color:'#facc15'}]);

const tMode=ref('walk');

let chatId=1,dashMap=null,awMap=null,ecoMap=null,gsMap=null,ecoLayers=[],gsLayers=[],scatterChart=null,forecastChart=null,besthourChart=null,radarChart=null,impactChart=null,renderer3d=null,scene3d=null,camera3d=null,isDragging=false,lastMouse={x:0,y:0},rotY=0,rotX=0.3;

const formatTs=ts=>{if(!ts)return'N/A';const d=new Date(ts);return d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});};

const fetchZones=async()=>{
try{const r=await fetch(`${API}/api/zones`);zonas.value=await r.json();}
catch{zonas.value=syntheticZones();}
};

const fetchDash=async()=>{
try{const r=await fetch(`${API}/api/dashboard`);const d=await r.json();dash.value=d;if(d.zones)zonas.value=d.zones;}
catch{const z=syntheticZones();zonas.value=z;dash.value={avgAqi:Math.round(z.reduce((s,x)=>s+x.aqi,0)/z.length),avgTraffic:Math.round(z.reduce((s,x)=>s+x.traffic,0)/z.length),alertCount:z.filter(x=>x.no2>55).length,avgGreenScore:Math.round(z.reduce((s,x)=>s+x.greenScore,0)/z.length),alerts:z.filter(x=>x.no2>55).map(x=>({zone:x.name,no2:x.no2,noise:x.noise}))};}
updateDashMap();updateIndicators();
};

const fetchGS=async()=>{
try{const r=await fetch(`${API}/api/greenscore`);const d=await r.json();gsRanked.value=d.ranked||[];bestZone.value=d.bestZone||null;}
catch{const z=syntheticZones();const ranked=[...z].sort((a,b)=>b.greenScore-a.greenScore).map((x,i)=>({...x,rank:i+1,trend:['up','down','stable'][Math.floor(Math.random()*3)],mlPrediction:Math.round(x.greenScore*0.98)}));gsRanked.value=ranked;bestZone.value=ranked[0]||null;}
updateGSMap();updateRadarChart();
};

const calcRuta=async()=>{
if(!ecoOrigen.value||!ecoDest.value)return;
try{const r=await fetch(`${API}/api/ecoruta?origin=${ecoOrigen.value}&destination=${ecoDest.value}`);const d=await r.json();rutas.value=d.routes||[];bestHours.value=d.bestHours||[];if(d.zones&&d.zones.length)zonas.value=d.zones;}
catch{rutas.value=[];bestHours.value=[];}
drawEcoRoutes();updateBestHourChart();
};

const getRouteStats = (r) => {
  const dist = r.distKm || 0;
  let speed = 5, co2Rate = 0;
  if (tMode.value === 'car') { speed = 30; co2Rate = 120; }
  else if (tMode.value === 'bus') { speed = 20; co2Rate = 50; }
  else if (tMode.value === 'bike') { speed = 15; co2Rate = 0; }
  else if (tMode.value === 'walk') { speed = 5; co2Rate = 0; }
  return {
    timeMin: Math.max(1, Math.round((dist / speed) * 60)),
    co2g: Math.round(dist * co2Rate)
  };
};

// Synthetic fallback
const syntheticZones=()=>[
{id:'centro',name:'Centro/María Pita',lat:43.3713,lon:-8.3961,no2:58,pm25:22,pm10:38,co2:210,noise:72,traffic:800,aqi:168,greenScore:35,timestamp:new Date().toISOString()},
{id:'ensanche',name:'Ensanche',lat:43.368,lon:-8.405,no2:52,pm25:18,pm10:32,co2:188,noise:68,traffic:650,aqi:150,greenScore:42,timestamp:new Date().toISOString()},
{id:'orzan',name:'Orzán',lat:43.3745,lon:-8.4083,no2:35,pm25:12,pm10:22,co2:128,noise:58,traffic:320,aqi:101,greenScore:62,timestamp:new Date().toISOString()},
{id:'riazor',name:'Riazor',lat:43.3701,lon:-8.4201,no2:38,pm25:13,pm10:24,co2:138,noise:62,traffic:410,aqi:110,greenScore:58,timestamp:new Date().toISOString()},
{id:'monteAlto',name:'Monte Alto',lat:43.3778,lon:-8.4147,no2:28,pm25:9,pm10:16,co2:102,noise:51,traffic:210,aqi:81,greenScore:74,timestamp:new Date().toISOString()},
{id:'ciudadVieja',name:'Ciudad Vieja',lat:43.373,lon:-8.3928,no2:32,pm25:11,pm10:20,co2:118,noise:55,traffic:290,aqi:92,greenScore:66,timestamp:new Date().toISOString()},
{id:'osCastros',name:'Os Castros',lat:43.358,lon:-8.405,no2:41,pm25:14,pm10:26,co2:150,noise:60,traffic:380,aqi:118,greenScore:52,timestamp:new Date().toISOString()},
{id:'labanhou',name:'Labañou',lat:43.3622,lon:-8.4183,no2:36,pm25:12,pm10:22,co2:132,noise:57,traffic:290,aqi:104,greenScore:60,timestamp:new Date().toISOString()},
{id:'juanFlorez',name:'Juan Flórez',lat:43.366,lon:-8.412,no2:49,pm25:17,pm10:30,co2:178,noise:66,traffic:560,aqi:142,greenScore:46,timestamp:new Date().toISOString()},
{id:'agraOrzan',name:'Agra do Orzán',lat:43.375,lon:-8.422,no2:33,pm25:11,pm10:20,co2:122,noise:54,traffic:270,aqi:96,greenScore:63,timestamp:new Date().toISOString()},
{id:'cuatroCaminos',name:'Cuatro Caminos',lat:43.3608,lon:-8.4089,no2:68,pm25:26,pm10:46,co2:245,noise:75,traffic:920,aqi:196,greenScore:22,timestamp:new Date().toISOString()},
{id:'elvina',name:'Elviña',lat:43.3344,lon:-8.4094,no2:30,pm25:10,pm10:18,co2:110,noise:52,traffic:340,aqi:87,greenScore:70,timestamp:new Date().toISOString()},
{id:'mesoiro',name:'Mesoiro',lat:43.3289,lon:-8.4247,no2:24,pm25:8,pm10:14,co2:88,noise:47,traffic:180,aqi:69,greenScore:80,timestamp:new Date().toISOString()},
{id:'asXubias',name:'As Xubias',lat:43.3531,lon:-8.3842,no2:62,pm25:28,pm10:50,co2:225,noise:70,traffic:490,aqi:179,greenScore:28,timestamp:new Date().toISOString()},
{id:'matogrande',name:'Matogrande',lat:43.3469,lon:-8.4283,no2:26,pm25:9,pm10:16,co2:96,noise:49,traffic:220,aqi:75,greenScore:77,timestamp:new Date().toISOString()},
];

const zoneColor=gs=>gs>65?'#00e676':gs>40?'#ffea00':'#ff1744';
const aqiColor=aqi=>aqi<100?'#00e676':aqi<150?'#ffea00':'#ff1744';

// DASHBOARD MAP
const initDashMap=()=>{
if(!document.getElementById('dash-map'))return;
dashMap=L.map('dash-map').setView([43.362,-8.41],12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(dashMap);
};
const updateDashMap=()=>{
if(!dashMap||!zonas.value.length)return;
dashMap.eachLayer(l=>{if(l instanceof L.CircleMarker)dashMap.removeLayer(l)});
const z=zonas.value;
z.forEach(zone=>{
const col=aqiColor(zone.aqi);
L.circleMarker([zone.lat,zone.lon],{radius:10,color:col,fillColor:col,fillOpacity:0.8,weight:2,className:'pulse-marker'})
.addTo(dashMap).bindPopup(`<div style="background:#161d2e;color:#fff;padding:12px;border-radius:8px;min-width:160px;font-family:Inter"><b>${zone.name}</b><br><br>NO₂: <span style="color:#00e5ff">${zone.no2} µg/m³</span><br>AQI: <span style="color:#00e5ff">${zone.aqi}</span><br>GreenScore: <span style="color:#00e676">${zone.greenScore}</span></div>`);
});
};

// AIRWATCH MAP (heatmap-style)
const initAWMap=()=>{
if(!document.getElementById('aw-map'))return;
awMap=L.map('aw-map').setView([43.362,-8.41],12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(awMap);
const z=zonas.value.length?zonas.value:syntheticZones();
z.forEach(zone=>{
const radius=zone.no2*5;
const col=aqiColor(zone.aqi);
L.circle([zone.lat,zone.lon],{radius,color:col,fillColor:col,fillOpacity:0.3,weight:0}).addTo(awMap);
L.circleMarker([zone.lat,zone.lon],{radius:6,color:col,fillColor:col,fillOpacity:1,weight:1})
.addTo(awMap).bindPopup(`<div style="background:#161d2e;color:#fff;padding:8px"><b>${zone.name}</b><br>NO₂: ${zone.no2}<br>PM2.5: ${zone.pm25}</div>`);
});
};

// INDICATORS
const updateIndicators=()=>{
const z=zonas.value;if(!z.length)return;
const avg=(k)=>Math.round(z.reduce((s,x)=>s+(x[k]||0),0)/z.length);
indicators.value=[
{label:'NO₂ µg/m³',value:avg('no2'),color:avg('no2')>50?'#ff1744':'#00e676'},
{label:'CO₂ µg/m³',value:avg('co2'),color:'#a78bfa'},
{label:'PM10 µg/m³',value:avg('pm10'),color:'#fb923c'},
{label:'PM2.5 µg/m³',value:avg('pm25'),color:'#f43f5e'},
{label:'Ruido dB',value:avg('noise'),color:avg('noise')>65?'#ffea00':'#00e676'},
];
};

// SCATTER CHART
const initScatterChart=()=>{
const ctx=document.getElementById('scatter-chart');if(!ctx)return;
const z=zonas.value.length?zonas.value:syntheticZones();
if(scatterChart)scatterChart.destroy();
scatterChart=new Chart(ctx,{type:'scatter',data:{datasets:[{label:'Zonas A Coruña',data:z.map(x=>({x:x.traffic,y:x.no2,label:x.name})),backgroundColor:z.map(x=>aqiColor(x.aqi)),pointRadius:8,pointHoverRadius:12}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#94a3b8'}},tooltip:{callbacks:{label:p=>{const d=p.raw;return `${d.label}: Tráfico ${d.x}, NO₂ ${d.y}`;},}}},scales:{x:{title:{display:true,text:'Tráfico (veh/h)',color:'#94a3b8'},ticks:{color:'#94a3b8'},grid:{color:'rgba(255,255,255,.05)'}},y:{title:{display:true,text:'NO₂ (µg/m³)',color:'#94a3b8'},ticks:{color:'#94a3b8'},grid:{color:'rgba(255,255,255,.05)'}}}}}); 
};

// FORECAST CHART
const initForecastChart=async()=>{
const ctx=document.getElementById('forecast-chart');if(!ctx)return;
let fcData=[];
try{const r=await fetch(`${API}/api/airwatch`);const d=await r.json();
const fcs=d.forecasts||{};const zids=Object.keys(fcs).slice(0,3);
const labels=['1h','2h','3h','4h','5h','6h'];
const colors=['#00e5ff','#00e676','#ffea00'];
const datasets=zids.map((zid,i)=>({label:d.zones?.find(z=>z.id===zid)?.name||zid,data:(fcs[zid]||[]).map(f=>f.no2),borderColor:colors[i],backgroundColor:'transparent',borderWidth:3,tension:0.4,pointBackgroundColor:colors[i],pointRadius:4}));
if(forecastChart)forecastChart.destroy();
forecastChart=new Chart(ctx,{type:'line',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#94a3b8'}}},scales:{x:{ticks:{color:'#94a3b8'},grid:{color:'rgba(255,255,255,.05)'}},y:{title:{display:true,text:'NO₂ (µg/m³)',color:'#94a3b8'},ticks:{color:'#94a3b8'},grid:{color:'rgba(255,255,255,.05)'}}}}}); 
}catch{const z=syntheticZones().slice(0,3);const labels=['1h','2h','3h','4h','5h','6h'];
if(forecastChart)forecastChart.destroy();
forecastChart=new Chart(ctx,{type:'line',data:{labels,datasets:z.map((x,i)=>({label:x.name,data:[x.no2*.9,x.no2*1.1,x.no2*1.3,x.no2*1.2,x.no2*1.0,x.no2*.8],borderColor:['#00e5ff','#00e676','#ffea00'][i],backgroundColor:'transparent',borderWidth:3,tension:0.4}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#94a3b8'}}},scales:{x:{ticks:{color:'#94a3b8'},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'#94a3b8'},grid:{color:'rgba(255,255,255,.05)'}}}}}); }
};

// THREE.JS 3D
const init3D=()=>{
const container=document.getElementById('canvas3d');if(!container)return;
const W=container.clientWidth||800,H=420;
scene3d=new THREE.Scene();
camera3d=new THREE.PerspectiveCamera(45,W/H,0.1,1000);
renderer3d=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer3d.setSize(W,H);
renderer3d.setClearColor(0x030712,1);
container.appendChild(renderer3d.domElement);

const gGeo=new THREE.PlaneGeometry(20,20);
const gMat=new THREE.MeshBasicMaterial({color:0x0b1120,side:THREE.DoubleSide});
const ground=new THREE.Mesh(gGeo,gMat);ground.rotation.x=-Math.PI/2;scene3d.add(ground);

const grid=new THREE.GridHelper(20,20,0x00e5ff,0x1e3050);
grid.material.opacity=0.2; grid.material.transparent=true;
scene3d.add(grid);

const ambL=new THREE.AmbientLight(0xffffff,0.6);scene3d.add(ambL);
const dirL=new THREE.DirectionalLight(0x00e5ff,1);dirL.position.set(5,10,5);scene3d.add(dirL);

const z=zonas.value.length?zonas.value:syntheticZones();
const latC=43.36,lonC=-8.41,scale=80;
z.forEach(zone=>{
const x=(zone.lon-lonC)*scale;
const zz=-(zone.lat-latC)*scale;
const h=Math.max(0.2,zone.no2/12);
const col=zone.no2>55?0xff1744:zone.no2>35?0xffea00:0x00e676;
const geo=new THREE.CylinderGeometry(0.15,0.25,h,12);
const mat=new THREE.MeshPhongMaterial({color:col,transparent:true,opacity:0.8,emissive:col,emissiveIntensity:0.4});
const bar=new THREE.Mesh(geo,mat);
bar.position.set(x,h/2,zz);
scene3d.add(bar);
const sGeo=new THREE.SphereGeometry(0.15,16,16);
const sMat=new THREE.MeshBasicMaterial({color:col});
const sphere=new THREE.Mesh(sGeo,sMat);sphere.position.set(x,h+0.15,zz);scene3d.add(sphere);
});

camera3d.position.set(0,8,14);camera3d.lookAt(0,0,0);

const el=renderer3d.domElement;
el.addEventListener('mousedown',e=>{isDragging=true;lastMouse={x:e.clientX,y:e.clientY};});
el.addEventListener('mousemove',e=>{if(!isDragging)return;rotY+=(e.clientX-lastMouse.x)*0.005;rotX+=(e.clientY-lastMouse.y)*0.005;rotX=Math.max(0,Math.min(1.2,rotX));lastMouse={x:e.clientX,y:e.clientY};});
el.addEventListener('mouseup',()=>{isDragging=false;});
el.addEventListener('wheel',e=>{camera3d.position.multiplyScalar(e.deltaY>0?1.05:0.95);});

const animate=()=>{requestAnimationFrame(animate);
const r=14;camera3d.position.x=Math.sin(rotY)*r;camera3d.position.z=Math.cos(rotY)*r;camera3d.position.y=Math.max(2,rotX*14);camera3d.lookAt(0,0,0);
renderer3d.render(scene3d,camera3d);};animate();
};

// ECORUTA MAP
const initEcoMap=()=>{
if(!document.getElementById('eco-map'))return;
ecoMap=L.map('eco-map').setView([43.362,-8.41],12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(ecoMap);
const z=zonas.value.length?zonas.value:syntheticZones();
z.forEach(zone=>{L.circleMarker([zone.lat,zone.lon],{radius:6,color:'#00e5ff',fillColor:'#00e5ff',fillOpacity:0.4,weight:1}).addTo(ecoMap).bindPopup(zone.name);});
};

const drawEcoRoutes=()=>{
if(!ecoMap)return;
ecoLayers.forEach(l=>ecoMap.removeLayer(l));ecoLayers=[];
rutas.value.forEach(r=>{
const pts=r.points.map(p=>[p.lat,p.lon]);
if(pts.length<2)return;
const pl=L.polyline(pts,{color:r.color,weight:6,opacity:0.8});
pl.addTo(ecoMap);ecoLayers.push(pl);
pl.bindTooltip(r.name,{sticky:true});
});
if(rutas.value.length&&rutas.value[0].points.length>1){
const pts=rutas.value[0].points.map(p=>[p.lat,p.lon]);ecoMap.fitBounds(L.latLngBounds(pts),{padding:[30,30]});}
};

// BEST HOUR CHART
const updateBestHourChart=()=>{
const ctx=document.getElementById('besthour-chart');if(!ctx||!bestHours.value.length)return;
const h=bestHours.value;const minAqi=Math.min(...h.map(x=>x.aqi));const bestH=h.find(x=>x.aqi===minAqi);
if(besthourChart)besthourChart.destroy();
besthourChart=new Chart(ctx,{type:'bar',data:{labels:h.map(x=>x.hour),datasets:[{label:'AQI por hora',data:h.map(x=>x.aqi),backgroundColor:h.map(x=>x.aqi<100?'rgba(0,230,118,0.7)':x.aqi<150?'rgba(255,234,0,0.7)':'rgba(255,23,68,0.7)'),borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{afterLabel:p=>`Mejor hora: ${bestH?.hour}`}}},scales:{x:{ticks:{color:'#94a3b8',maxRotation:0,maxTicksLimit:12},grid:{color:'rgba(255,255,255,.05)'}},y:{title:{display:true,text:'AQI Predicho',color:'#94a3b8'},ticks:{color:'#94a3b8'},grid:{color:'rgba(255,255,255,.05)'}}}}});
};

// GREENSCORE MAP
const initGSMap=()=>{
if(!document.getElementById('gs-map'))return;
gsMap=L.map('gs-map').setView([43.362,-8.41],12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(gsMap);
};
const updateGSMap=()=>{
if(!gsMap)return;
gsLayers.forEach(l=>gsMap.removeLayer(l));gsLayers=[];
const z=gsRanked.value.length?gsRanked.value:(zonas.value.length?zonas.value:syntheticZones());
z.forEach(zone=>{
const col=zoneColor(zone.greenScore);
const r=L.circle([zone.lat,zone.lon],{radius:700,color:col,fillColor:col,fillOpacity:0.3,weight:2}).addTo(gsMap);
r.bindPopup(`<div style="background:#161d2e;color:#fff;padding:8px;border-radius:6px"><b>${zone.name}</b><br>GreenScore: <b>${zone.greenScore}</b>/100<br>ML: ${zone.mlPrediction||'N/A'}</div>`);
gsLayers.push(r);
L.circleMarker([zone.lat,zone.lon],{radius:6,color:col,fillColor:col,fillOpacity:1,weight:2}).addTo(gsMap);
});
};

// RADAR CHART
const updateRadarChart=()=>{
const ctx=document.getElementById('radar-chart');if(!ctx)return;
const top3=(gsRanked.value.length?gsRanked.value:syntheticZones()).slice(0,3);
if(radarChart)radarChart.destroy();
const colors=['rgba(0,229,255,0.8)','rgba(0,230,118,0.8)','rgba(255,234,0,0.8)'];
radarChart=new Chart(ctx,{type:'radar',data:{labels:['Calidad Aire','Ruido (Bajo)','Tráfico (Bajo)','Predictivo ML','GreenScore'],datasets:top3.map((z,i)=>({label:z.name,data:[100-Math.min(100,(z.no2||50)),100-Math.min(100,(z.noise||60)),100-Math.min(100,(z.traffic||500)/10),z.mlPrediction||z.greenScore,z.greenScore],backgroundColor:colors[i].replace('0.8','0.2'),borderColor:colors[i],borderWidth:2,pointBackgroundColor:colors[i]}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#cbd5e1',font:{size:12}}}},scales:{r:{ticks:{color:'#94a3b8',backdropColor:'transparent'},grid:{color:'rgba(0,229,255,0.2)'},angleLines:{color:'rgba(0,229,255,0.2)'},pointLabels:{color:'#cbd5e1',font:{size:11}}}}}}); 
};

// IMPACT CHART
const initImpactChart=()=>{
const ctx=document.getElementById('impact-chart');if(!ctx)return;
if(impactChart)impactChart.destroy();
impactChart=new Chart(ctx,{type:'line',data:{labels:['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'],datasets:[{label:'Impacto Positivo (Puntos)',data:[12,24,18,35,42,28,45],borderColor:'#00e5ff',backgroundColor:'rgba(0,229,255,0.2)',borderWidth:3,pointBackgroundColor:'#00e5ff',pointRadius:5,fill:true,tension:0.4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#94a3b8'}},x:{grid:{display:false},ticks:{color:'#94a3b8'}}}}});
};

// CHAT
const sendChat=async()=>{
const msg=chatIn.value.trim();if(!msg)return;
chatMsgs.value.push({id:chatId++,text:msg,u:true});chatIn.value='';
try{const r=await fetch(`${API}/api/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});const d=await r.json();chatMsgs.value.push({id:chatId++,text:d.response,u:false});}
catch{chatMsgs.value.push({id:chatId++,text:'No puedo conectar con el servidor URBS ahora mismo.',u:false});}
setTimeout(()=>{const el=document.getElementById('chat-msgs');if(el)el.scrollTop=el.scrollHeight;},100);
};

// TAB WATCH
watch(tab,async(t)=>{
if(t==='airwatch'){
setTimeout(()=>{initAWMap();initScatterChart();init3D();initForecastChart();},300);
}else if(t==='ecoruta'){
setTimeout(()=>{initEcoMap(); if(rutas.value.length)drawEcoRoutes();},300);
}else if(t==='greenscore'){
await fetchGS();setTimeout(()=>{initGSMap();updateGSMap();updateRadarChart();},300);
}else if(t==='perfil'){
setTimeout(()=>{initImpactChart();},300);
}
});

onMounted(async()=>{
await fetchDash();
setTimeout(()=>{initDashMap();updateDashMap();},400);
setInterval(fetchDash,30000);
});

return{tab,zonas,dash,gsRanked,bestZone,rutas,bestHours,ecoOrigen,ecoDest,chatOpen,chatIn,chatMsgs,indicators,calcRuta,sendChat,formatTs,tMode,getRouteStats};
}}).mount('#app');
</script>
</body>
</html>
