services:
  mongo:
    image: mongo:4.4
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  orion:
    image: fiware/orion:latest
    ports:
      - "1026:1026"
    depends_on:
      - mongo
    command: -dbURI mongodb://mongo:27017 -logLevel DEBUG

  iot-agent:
    image: fiware/iotagent-ul:latest
    ports:
      - "4041:4041"
      - "7896:7896"
    depends_on:
      - mongo
    environment:
      - IOTA_CB_HOST=orion
      - IOTA_CB_PORT=1026
      - IOTA_NORTH_PORT=4041
      - IOTA_REGISTRY_TYPE=mongodb
      - IOTA_LOG_LEVEL=DEBUG
      - IOTA_TIMESTAMP=true
      - IOTA_CB_NGSI_VERSION=v2
      - IOTA_MONGO_HOST=mongo
      - IOTA_MONGO_PORT=27017
      - IOTA_MONGO_DB=iotagentul
      - IOTA_HTTP_PORT=7896
      - IOTA_PROVIDER_URL=http://iot-agent:4041
      - IOTA_MQTT_HOST=mosquitto
      - IOTA_MQTT_PORT=1883

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  cratedb:
    image: crate:5.4
    ports:
      - "4200:4200"
      - "5432:5432"
    environment:
      - CRATE_HEAP_SIZE=2g
    command: crate -Cdiscovery.type=single-node -Ccluster.name=quantumleap
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  quantumleap:
    image: orchestracities/quantumleap:latest
    ports:
      - "8668:8668"
    depends_on:
      - cratedb
    environment:
      - CRATE_HOST=cratedb
      - LOGLEVEL=DEBUG

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      cratedb:
        condition: service_started
      grafana-seed:
        condition: service_completed_successfully
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_DEFAULT_THEME=dark
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning

  grafana-seed:
    image: python:3.11-slim
    depends_on:
      cratedb:
        condition: service_healthy
    environment:
      - CRATEDB_URL=http://cratedb:4200
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "pip install requests && python seed_grafana.py"
    restart: on-failure

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    command: serve

  backend:
    image: python:3.11-slim
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate
      - OLLAMA_MODEL=phi
    command: sh -c "pip install -r requirements.txt && flask --app main run --host=0.0.0.0 --port=8000"
    depends_on:
      - orion
      - quantumleap
      - ollama

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
      - ./mascot.png:/usr/share/nginx/html/mascot.png
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

volumes:
  mongo-data:
  ollama-data:
