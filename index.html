<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>UrbanPulse - A Coruña</title>
    <!-- Leaflet -->
    <link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'/>
    <!-- Vue 3 -->
    <script src='https://unpkg.com/vue@3/dist/vue.global.js'></script>
    <!-- ChartJS -->
    <script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
    <!-- ThreeJS -->
    <script src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js'></script>
    <style>
        :root {
            --bg-color: #0f141e;
            --text-color: #e2e8f0;
            --primary: #00f0ff;
            --accent: #ff0055;
            --glass-bg: rgba(20, 25, 40, 0.7);
            --glass-border: rgba(0, 240, 255, 0.2);
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-color); }
        #app { display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background: var(--glass-bg); border-right: 1px solid var(--glass-border); padding: 20px; display: flex; flex-direction: column; z-index: 1000;}
        .sidebar h1 { color: var(--primary); text-transform: uppercase; font-size: 1.5rem; text-shadow: 0 0 10px var(--primary); margin-bottom: 2rem;}
        .nav-items { display: flex; flex-direction: column; gap: 10px; }
        .nav-item { padding: 12px 15px; border-radius: 8px; cursor: pointer; transition: all 0.3s; background: rgba(255,255,255,0.05); }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: #000; font-weight: bold; }
        
        .main-content { flex: 1; position: relative; padding: 20px; overflow-y: auto; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 20px; backdrop-filter: blur(10px); }
        
        .kpi-value { font-size: 2.5rem; font-weight: bold; color: var(--primary); }
        #map { height: 400px; width: 100%; border-radius: 12px; margin-top: 20px; }
        #canvas3d { width: 100%; height: 300px; border-radius: 12px; margin-top: 20px; }
        
        .chat-widget { position: fixed; bottom: 20px; right: 20px; width: 300px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; z-index: 9999; display: flex; flex-direction: column; overflow: hidden;}
        .chat-header { background: var(--primary); color: #000; padding: 10px; font-weight: bold; cursor: pointer;}
        .chat-body { height: 250px; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;}
        .chat-input { display: flex; padding: 10px; border-top: 1px solid var(--glass-border); }
        .chat-input input { flex: 1; padding: 8px; border: none; border-radius: 4px; background: rgba(255,255,255,0.1); color: white; }
        .chat-input button { background: var(--primary); color: #000; border: none; padding: 8px 15px; border-radius: 4px; margin-left: 5px; cursor: pointer; }
        
        .msg-user { align-self: flex-end; background: var(--primary); color: #000; padding: 5px 10px; border-radius: 10px; }
        .msg-urbs { align-self: flex-start; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 10px; }

        .profile-pic { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 20px; display: block; border: 2px solid var(--primary); }
    </style>
</head>
<body>
    <div id='app'>
        <div class='sidebar'>
            <h1>UrbanPulse</h1>
            <div class='nav-items'>
                <div class='nav-item' :class='{active: currentTab===
